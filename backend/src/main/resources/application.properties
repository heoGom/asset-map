spring.application.name=asset-map-backend
spring.profiles.default=local
spring.config.import=optional:file:.local-secrets.properties,optional:file:backend/.local-secrets.properties

# JPA common
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# JWT common
app.jwt.expiration-ms=86400000

# Public Data Portal - Financial Services Commission stock dividend API.
# Set the real key outside Git with PUBLIC_DATA_STOCK_DIVIDEND_SERVICE_KEY.
external.public-data.stock-dividend.base-url=https://apis.data.go.kr/1160100/GetStocDiviInfoService_V2
external.public-data.stock-dividend.service-key=${PUBLIC_DATA_STOCK_DIVIDEND_SERVICE_KEY:}
external.public-data.stock-dividend.result-type=json
external.public-data.stock-dividend.default-from-year=2020

# KRX data API. Store the real key outside Git with KRX_API_KEY.
external.krx.api-key=${KRX_API_KEY:}
external.krx.security-master.kospi-url=https://data-dbg.krx.co.kr/svc/apis/sto/stk_isu_base_info
external.krx.security-master.kosdaq-url=https://data-dbg.krx.co.kr/svc/apis/sto/ksq_isu_base_info
external.krx.security-master.default-bas-dd=${KRX_SECURITY_MASTER_BASE_DATE:}
external.krx.market-price.kospi-url=https://data-dbg.krx.co.kr/svc/apis/sto/stk_bydd_trd
external.krx.market-price.kosdaq-url=https://data-dbg.krx.co.kr/svc/apis/sto/ksq_bydd_trd
external.krx.market-price.etf-url=https://data-dbg.krx.co.kr/svc/apis/etp/etf_bydd_trd

# External data sync is opt-in per profile. Test profile must keep it disabled.
app.sync.enabled=false
app.sync.on-startup.enabled=false
app.sync.security-master.enabled=false
app.sync.security-master.on-startup=false
app.sync.security-master.cron=-
app.sync.market-prices.enabled=false
app.sync.market-prices.on-startup=false
app.sync.market-prices.cron=-
app.sync.market-prices.default-lookback-days=30
app.sync.market-prices.max-backfill-days=60
app.sync.stock-dividends.enabled=false
app.sync.stock-dividends.on-startup=false
app.sync.stock-dividends.cron=-
app.sync.stock-dividends.default-from-year=2020
app.sync.stock-dividends.recheck-years=2
app.sync.no-data-recheck-days=7
