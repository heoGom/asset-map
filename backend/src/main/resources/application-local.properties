# Local profile: single-machine development with H2.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:assetmap-local
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.data-locations=optional:classpath:db/data.local.sql,optional:classpath:db/seed.local.sql

logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.com.assetmap.backend=DEBUG
logging.level.org.springframework.security=INFO

app.jwt.secret=${JWT_SECRET:asset-map-local-development-secret-key-for-hs256-authentication}
