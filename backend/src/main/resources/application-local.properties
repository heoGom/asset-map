# Local profile: Docker MySQL for single-machine development.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:23306/asset_map?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=assetmap
spring.datasource.password=assetmap

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=never

logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.com.assetmap.backend=DEBUG
logging.level.org.springframework.security=INFO

app.jwt.secret=${JWT_SECRET:asset-map-local-development-secret-key-for-hs256-authentication}

app.sync.enabled=true
app.sync.on-startup.enabled=true

app.sync.security-master.enabled=true
app.sync.security-master.on-startup=true
app.sync.security-master.cron=0 10 7 * * *

app.sync.market-prices.enabled=true
app.sync.market-prices.on-startup=true
app.sync.market-prices.cron=0 30 18 * * MON-FRI
app.sync.market-prices.default-lookback-days=30
app.sync.market-prices.max-backfill-days=60

app.sync.stock-dividends.enabled=true
app.sync.stock-dividends.on-startup=true
app.sync.stock-dividends.cron=0 0 8 * * *
app.sync.stock-dividends.default-from-year=2020
app.sync.stock-dividends.recheck-years=2
