# Test profile: keep fast isolated H2 tests.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:assetmap-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=never

app.sync.enabled=false
app.sync.on-startup.enabled=false
app.sync.security-master.enabled=false
app.sync.security-master.on-startup=false
app.sync.market-prices.enabled=false
app.sync.market-prices.on-startup=false
app.sync.stock-dividends.enabled=false
app.sync.stock-dividends.on-startup=false
app.sync.no-data-recheck-days=7

logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.assetmap.backend=INFO
logging.level.org.springframework.security=WARN

app.jwt.secret=${JWT_SECRET:asset-map-test-secret-key-for-hs256-authentication}
