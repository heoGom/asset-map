# Dev profile: shared development environment.
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.url=${DB_URL:jdbc:h2:mem:assetmap-dev}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never

logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.com.assetmap.backend=DEBUG
logging.level.org.springframework.security=INFO

app.jwt.secret=${JWT_SECRET:asset-map-dev-development-secret-key-for-hs256-authentication}
